<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>健康諮詢表 · 天領 Talent Lead</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
<style>
:root{
  /* Clinical cool palette */
  --bg:#eef2f6;--paper:#ffffff;--ink:#1c2733;--ink-soft:#5b6b7a;--ink-faint:#8a98a6;
  --line:#e2e9f0;--line-strong:#cbd6e1;
  --teal:#0e7c86;--teal-deep:#0a5b63;--teal-tint:#e3f1f2;--teal-soft:#f1f8f9;
  --blue:#2b6cb0;--coral:#d64a3f;--amber:#c98a16;--violet:#6b5bb0;--leaf:#4f9a52;
  --shadow:0 1px 2px rgba(28,39,51,.05),0 1px 3px rgba(28,39,51,.04);
  --shadow-lift:0 4px 16px rgba(28,39,51,.07);
  --radius:14px;--radius-sm:10px;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{scroll-behavior:smooth}
body{margin:0;background:var(--bg);color:var(--ink);font-family:"Noto Sans TC",system-ui,sans-serif;
  font-weight:400;line-height:1.6;font-size:15.5px;letter-spacing:.005em;
  -webkit-font-smoothing:antialiased;padding-bottom:env(safe-area-inset-bottom);
  counter-reset:sec}
.wrap{position:relative;z-index:1;max-width:880px;margin:0 auto;padding:0 18px 48px}

/* Header */
header{padding:34px 6px 18px;border-bottom:1px solid var(--line);margin-bottom:4px}
.head-top{display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap}
.brand{display:flex;align-items:center;gap:13px}
.brand-mark{width:46px;height:46px;border-radius:11px;background:linear-gradient(140deg,var(--teal),var(--teal-deep));
  display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:1.25rem;
  box-shadow:var(--shadow-lift);letter-spacing:0}
.brand-name{font-weight:700;font-size:1.02rem;color:var(--teal-deep);letter-spacing:.16em}
.brand-sub{font-size:.62rem;color:var(--ink-faint);letter-spacing:.32em;text-transform:uppercase;margin-top:2px}
.advisor{font-size:.82rem;color:var(--ink-soft);text-align:right}
.advisor b{display:block;color:var(--teal-deep);font-weight:600;letter-spacing:.04em;font-size:.95rem;margin-top:2px}
.advisor [contenteditable]{border-bottom:1px dashed transparent;border-radius:2px;outline:none;transition:.15s;cursor:text;min-width:2em;display:inline-block}
.advisor [contenteditable]:hover{border-bottom-color:var(--teal)}
.advisor [contenteditable]:focus{border-bottom-color:var(--teal);background:var(--teal-tint);padding:0 4px}
h1{font-weight:900;font-size:1.92rem;margin:22px 0 0;letter-spacing:.04em;color:var(--ink);
  display:flex;align-items:center;gap:13px}
h1::before{content:"";width:5px;height:1.5em;background:var(--teal);border-radius:3px;display:inline-block}
.subtitle{font-size:.82rem;color:var(--ink-soft);margin:8px 0 0 18px;letter-spacing:.02em}

/* Sticky nav */
nav{position:-webkit-sticky;position:sticky;top:0;z-index:30;padding:0;margin:0 -18px;
  background:rgba(238,242,246,.92);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  border-bottom:1px solid var(--line-strong)}
.nav-inner{display:flex;align-items:center;gap:0;max-width:880px;margin:0 auto;padding:0 18px}
.nav-menu-btn{flex:0 0 auto;display:flex;align-items:center;justify-content:center;
  width:36px;height:36px;border-radius:9px;border:1px solid var(--line);background:#fff;
  color:var(--ink-soft);cursor:pointer;margin:8px 10px 8px 0;flex-shrink:0;transition:.16s}
.nav-menu-btn:hover{background:var(--teal);color:#fff;border-color:var(--teal)}
.nav-scroll{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch;flex:1;padding:8px 0}
.nav-scroll::-webkit-scrollbar{display:none}
.nav-scroll a{flex:0 0 auto;font-size:.78rem;font-weight:500;color:var(--ink-soft);
  text-decoration:none;padding:7px 14px;border-radius:8px;border:1px solid transparent;
  background:transparent;white-space:nowrap;transition:.2s;cursor:pointer;user-select:none}
.nav-scroll a:hover{background:#fff;border-color:var(--line)}
.nav-scroll a.active{color:#fff;background:var(--teal);border-color:var(--teal);box-shadow:var(--shadow)}

/* Drawer */
.drawer-overlay{position:fixed;inset:0;z-index:50;background:rgba(28,39,51,.4);
  backdrop-filter:blur(2px);opacity:0;pointer-events:none;transition:opacity .25s}
.drawer-overlay.open{opacity:1;pointer-events:all}
.drawer{position:fixed;top:0;left:0;bottom:0;z-index:51;width:min(300px,82vw);
  background:var(--paper);box-shadow:4px 0 32px rgba(28,39,51,.14);
  transform:translateX(-100%);transition:transform .28s cubic-bezier(.4,0,.2,1);
  display:flex;flex-direction:column;overflow:hidden}
.drawer.open{transform:translateX(0)}
.drawer-head{display:flex;align-items:center;justify-content:space-between;
  padding:18px 18px 14px;border-bottom:1px solid var(--line);flex-shrink:0}
.drawer-title{font-weight:700;font-size:1rem;letter-spacing:.04em;color:var(--ink)}
.drawer-close{display:flex;align-items:center;justify-content:center;width:34px;height:34px;
  border-radius:9px;border:1px solid var(--line);background:#fff;color:var(--ink-soft);cursor:pointer;transition:.16s}
.drawer-close:hover{background:var(--coral);color:#fff;border-color:var(--coral)}
.drawer-list{overflow-y:auto;flex:1;padding:10px 10px 24px}
.drawer-item{display:flex;align-items:center;gap:12px;padding:11px 12px;border-radius:11px;
  cursor:pointer;transition:.16s;user-select:none;text-decoration:none;color:var(--ink)}
.drawer-item:hover{background:var(--teal-soft)}
.drawer-item.active{background:var(--teal-tint)}
.drawer-item .d-dot{width:28px;height:28px;border-radius:8px;flex:0 0 auto;font-size:.82rem;
  font-weight:700;color:#fff;display:flex;align-items:center;justify-content:center}
.drawer-item .d-label{font-size:.9rem;font-weight:500;flex:1;line-height:1.3}
.drawer-item .d-count{font-size:.7rem;color:var(--ink-faint)}

/* Progress */
.progress{position:sticky;top:0;z-index:31;height:3px;margin:0 -18px}
.progress span{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--teal),var(--leaf));transition:width .3s}

/* Sections */
section{background:var(--paper);border:1px solid var(--line);border-radius:var(--radius);
  margin-top:20px;box-shadow:var(--shadow);overflow:hidden;scroll-margin-top:70px}
section[data-title]{counter-increment:sec}
.sec-head{display:flex;align-items:center;gap:14px;padding:18px 20px;cursor:pointer;user-select:none;
  border-left:4px solid var(--sec-color,var(--teal));transition:background .15s}
.sec-head:hover{background:var(--teal-soft)}
.sec-head .dot{width:30px;height:30px;border-radius:9px;flex:0 0 auto;
  background:var(--sec-color,var(--teal));color:#fff;font-size:.92rem;font-weight:700;
  display:flex;align-items:center;justify-content:center;letter-spacing:0}
.sec-head .dot::before{content:counter(sec)}
.sec-head h2{font-weight:700;font-size:1.12rem;margin:0;flex:1;letter-spacing:.03em;color:var(--ink)}
.sec-head .count{font-size:.7rem;background:var(--bg);color:var(--ink-soft);padding:4px 10px;border-radius:7px;font-weight:500;border:1px solid var(--line)}
.sec-head .chev{transition:transform .25s;color:var(--ink-faint);flex:0 0 auto}
section.collapsed .chev{transform:rotate(-90deg)}
.sec-body{padding:8px 20px 22px;border-top:1px solid var(--line)}
section.collapsed .sec-body{display:none}

/* Fields */
.field{margin:16px 0}
.field>label{display:block;font-size:.82rem;font-weight:600;color:var(--ink-soft);margin-bottom:7px;letter-spacing:.02em;overflow-wrap:anywhere;word-break:break-word;line-height:1.45}
.req::after{content:" *";color:var(--coral)}
input[type=text],input[type=number],input[type=date],select,textarea{
  width:100%;min-width:0;max-width:100%;font-family:inherit;font-size:.95rem;color:var(--ink);
  background:#fff;border:1px solid var(--line-strong);border-radius:var(--radius-sm);padding:11px 13px;transition:.18s;outline:none}
input[type=date]{-webkit-appearance:none;appearance:none}
input[type=date]::-webkit-date-and-time-value{text-align:left}
input:focus,select:focus,textarea:focus{border-color:var(--teal);box-shadow:0 0 0 3px var(--teal-tint)}
input::placeholder,textarea::placeholder{color:var(--ink-faint)}
textarea{resize:vertical;min-height:64px;line-height:1.55}
.grid{display:grid;gap:14px}
.g2{grid-template-columns:1fr 1fr}
.g1{grid-template-columns:1fr}
.prio-row{display:flex;align-items:flex-start;gap:10px}
.prio-num{flex:0 0 auto;width:26px;height:26px;margin-top:9px;border-radius:8px;
  background:var(--violet);color:#fff;font-size:.74rem;font-weight:600;
  display:flex;align-items:center;justify-content:center}
.prio-input{flex:1;min-width:0;resize:none;overflow:hidden;min-height:46px;line-height:1.5;overflow-wrap:anywhere;word-break:break-word}
.g3{grid-template-columns:1fr 1fr 1fr}
@media(max-width:560px){.g3{grid-template-columns:1fr 1fr}}
@media(max-width:380px){.sym-detail{grid-template-columns:1fr}}
.with-unit{position:relative}
.with-unit .unit{position:absolute;right:13px;top:50%;transform:translateY(-50%);font-size:.78rem;color:var(--ink-faint);pointer-events:none}
.with-unit input{padding-right:44px}

/* Chips */
.chips{display:flex;flex-wrap:wrap;gap:8px}
.chip{cursor:pointer;font-size:.86rem;padding:8px 15px;border-radius:8px;
  border:1px solid var(--line-strong);background:#fff;color:var(--ink-soft);transition:.18s;user-select:none;overflow-wrap:anywhere;word-break:break-word;text-align:center;max-width:100%}
.chip input{display:none}
.chip.on{background:var(--teal);border-color:var(--teal);color:#fff;font-weight:500}

/* Flags */
.flags{display:flex;flex-wrap:wrap;gap:8px}
.flag{cursor:pointer;font-size:.84rem;padding:8px 14px;border-radius:8px;
  border:1px solid var(--line-strong);background:#fff;color:var(--ink-soft);user-select:none;transition:.18s}
.flag input{display:none}
.flag.on{background:#fdecea;border-color:var(--coral);color:var(--coral);font-weight:600}

/* Scale */
.scale{display:flex;gap:6px;flex-wrap:wrap}
.scale label{cursor:pointer}
.scale input{display:none}
.scale span{display:flex;align-items:center;justify-content:center;width:32px;height:32px;border-radius:9px;
  border:1.5px solid var(--scl-border,var(--line-strong));font-size:.82rem;font-weight:500;
  background:var(--scl-light,#fff);color:var(--scl-text,var(--ink-soft));transition:.15s}
.scale input:checked+span{background:var(--scl-bg,var(--teal));border-color:var(--scl-bg,var(--teal));
  color:#fff;font-weight:700;box-shadow:0 2px 8px rgba(0,0,0,.16)}

/* Med toggle */
.med-toggle{display:flex;gap:6px;margin-top:8px}
.med-toggle .medopt{flex:1;cursor:pointer;user-select:none}
.med-toggle .medopt input{display:none}
.med-toggle .medopt span{display:block;text-align:center;font-size:.76rem;padding:7px 8px;border-radius:8px;
  border:1px solid var(--line-strong);background:#fff;color:var(--ink-soft);transition:.16s;white-space:nowrap}
.med-toggle .medopt.on span{background:var(--teal);border-color:var(--teal);color:#fff;font-weight:600}

/* Symptom rows */
.sym{border-bottom:1px solid var(--line);padding:13px 2px}
.sym:last-child{border-bottom:none}
.sym-top{display:flex;align-items:center;gap:10px}
.sym-name{flex:1;min-width:0;font-size:.95rem;font-weight:500;overflow-wrap:anywhere;word-break:break-word;line-height:1.4}
.sym-toggles{display:flex;gap:6px;flex:0 0 auto}
.t{cursor:pointer;font-size:.76rem;padding:6px 13px;border-radius:8px;border:1px solid var(--line-strong);
  background:#fff;color:var(--ink-soft);user-select:none;transition:.16s;white-space:nowrap}
.t input{display:none}
.t.now.on{background:var(--coral);border-color:var(--coral);color:#fff;font-weight:600}
.t.past.on{background:var(--amber);border-color:var(--amber);color:#fff;font-weight:600}
.sym-detail{display:none;margin-top:12px;gap:10px;grid-template-columns:1fr 1fr;
  padding:13px;background:var(--teal-soft);border-radius:var(--radius-sm);border:1px solid var(--teal-tint)}
.sym.open .sym-detail{display:grid}
.sym-detail .full{grid-column:1/-1}
.sym-detail label{font-size:.72rem;color:var(--teal-deep);display:block;margin-bottom:4px;font-weight:600;overflow-wrap:anywhere;word-break:break-word}
.sym-detail input,.sym-detail select{padding:8px 10px;font-size:.86rem;border-radius:8px}

.btn{font-family:inherit;font-size:.88rem;font-weight:500;border:none;border-radius:var(--radius-sm);
  padding:13px 20px;min-height:46px;cursor:pointer;transition:.16s;white-space:nowrap;
  -webkit-tap-highlight-color:transparent;touch-action:manipulation}
.btn-ghost{background:#fff;border:1px solid var(--line-strong);color:var(--ink-soft)}
.btn-ghost:active{background:var(--bg)}
.footer-actions{margin-top:20px;display:flex;justify-content:center}

footer{text-align:center;color:var(--ink-soft);font-size:.74rem;margin-top:28px;letter-spacing:.01em;line-height:1.7;
  padding:22px 16px;background:var(--paper);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow)}
footer p:first-child{font-weight:600;margin-bottom:7px;color:var(--ink)}

/* Print gene section only */
@media print {
  body > *:not(#print-gene-root) { display: none !important; }
  #print-gene-root {
    display: block !important;
    position: static !important;
    margin: 0; padding: 16px;
    font-family: "Noto Sans TC", sans-serif;
    color: #111;
  }
  #print-gene-root .print-header { margin-bottom: 18px; border-bottom: 2px solid #6b5bb0; padding-bottom: 10px; }
  #print-gene-root .print-header h2 { margin: 0 0 4px; font-size: 1.3rem; color: #6b5bb0; }
  #print-gene-root .print-header p  { margin: 0; font-size: .82rem; color: #555; }
  #print-gene-root .print-promote   { margin-bottom: 14px; }
  #print-gene-root .print-promote span {
    display: inline-block; margin: 3px 4px; padding: 4px 12px;
    border: 1px solid #6b5bb0; border-radius: 999px; font-size: .82rem; color: #6b5bb0;
  }
  #print-gene-root table { width: 100%; border-collapse: collapse; margin-top: 8px; }
  #print-gene-root th { background: #f1eff9; color: #6b5bb0; padding: 8px 10px; text-align: left; font-size: .85rem; border: 1px solid #ddd; }
  #print-gene-root td { padding: 9px 10px; font-size: .9rem; border: 1px solid #ddd; vertical-align: top; }
  #print-gene-root tr:nth-child(even) td { background: #fafafa; }
  #print-gene-root .print-footer { margin-top: 24px; font-size: .72rem; color: #aaa; text-align: center; }
  .btn-print-gene { display: none !important; }
}
/* Modal */
.btn-danger{background:var(--coral);color:#fff}
.btn-danger:active{filter:brightness(.92)}
.modal-overlay{position:fixed;inset:0;z-index:60;display:none;align-items:center;justify-content:center;
  background:rgba(28,39,51,.45);backdrop-filter:blur(2px);padding:24px}
.modal-overlay.show{display:flex}
.modal-box{background:var(--paper);border-radius:16px;max-width:360px;width:100%;padding:24px 22px;
  box-shadow:0 20px 60px rgba(28,39,51,.25);animation:pop .18s ease}
@keyframes pop{from{transform:scale(.94);opacity:0}to{transform:scale(1);opacity:1}}
.modal-box h3{margin:0 0 8px;font-size:1.12rem;font-weight:700}
.modal-box p{margin:0 0 18px;font-size:.86rem;color:var(--ink-soft);line-height:1.6}
.modal-btns{display:flex;gap:10px;justify-content:flex-end}
.toast{position:fixed;left:50%;bottom:32px;transform:translateX(-50%) translateY(20px);z-index:70;
  background:var(--teal-deep);color:#fff;font-size:.86rem;padding:12px 22px;border-radius:10px;
  box-shadow:var(--shadow-lift);opacity:0;pointer-events:none;transition:.25s;max-width:90vw;text-align:center}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* Tablet two-column comfort */
@media(min-width:760px){
  .sec-body{padding:12px 26px 26px}
  .sec-head{padding:20px 24px}
  h1{font-size:2.1rem}
}
</style>
</head>
<body>
<div class="progress"><span id="bar"></span></div>

<!-- Side drawer menu -->
<div class="drawer-overlay" id="drawerOverlay"></div>
<div class="drawer" id="drawer">
  <div class="drawer-head">
    <span class="drawer-title">表單目錄</span>
    <button class="drawer-close" id="drawerClose" aria-label="關閉">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
    </button>
  </div>
  <div class="drawer-list" id="drawerList"></div>
</div>

<nav>
  <div class="nav-inner">
    <button class="nav-menu-btn" id="navMenuBtn" aria-label="開啟目錄">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>
    <div class="nav-scroll" id="nav"></div>
  </div>
</nav>

<div class="wrap">
  <header>
    <div class="head-top">
      <div class="brand">
        <div class="brand-mark" id="brandMark" title="點擊更換圖片" style="cursor:pointer;overflow:hidden;position:relative">
          <span id="brandText">天</span>
          <img id="brandImg" src="" alt="" style="display:none;width:100%;height:100%;object-fit:cover;position:absolute;inset:0;border-radius:11px">
          <input type="file" id="brandFile" accept="image/*" style="display:none">
        </div>
        <div>
          <div class="brand-name">天 領</div>
          <div class="brand-sub">Talent&nbsp;Lead</div>
        </div>
      </div>
      <div class="advisor">健康顧問
        <b contenteditable="true" id="advisorName" spellcheck="false">sky</b>
      </div>
    </div>
    <h1>健康諮詢表</h1>
    <p class="subtitle">Health Consultation Form · 完整評估與基因建議紀錄</p>
  </header>

  <form id="form" autocomplete="off">

  <!-- 基本資料 -->
  <section id="s-basic" data-title="基本資料" style="--sec-color:var(--teal)">
    <div class="sec-head"><span class="dot"></span><h2>基本資料</h2>
      <svg class="chev" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg></div>
    <div class="sec-body">
      <div class="grid g2">
        <div class="field"><label>日期</label><input type="date" name="日期"></div>
        <div class="field"><label>初／復（次）</label><div class="with-unit"><input type="number" inputmode="decimal" name="初復次" min="1" placeholder="1"><span class="unit">次</span></div></div>
      </div>
      <div class="grid g2">
        <div class="field"><label class="req">姓名</label><input type="text" name="姓名" placeholder="個案姓名"></div>
        <div class="field"><label>性別</label><select name="性別"><option value="">—</option><option>女</option><option>男</option></select></div>
      </div>
      <div class="grid g2">
        <div class="field"><label>生日</label><input type="date" name="生日"></div>
        <div class="field"><label>年紀</label><div class="with-unit"><input type="number" inputmode="decimal" name="年紀" min="0" placeholder=""><span class="unit">歲</span></div></div>
      </div>
      <div class="field"><label>職業</label><input type="text" name="職業"></div>
      <div class="field"><label>目前問題主述</label><textarea name="目前問題主述" placeholder="個案目前主要困擾／想解決的問題"></textarea></div>
      <div class="field"><label>過去重大病史及家族病史</label><textarea name="過去病史"></textarea></div>
      <div class="field"><label>慢性指標（異常請點選）</label>
        <div class="flags">
          <label class="flag"><input type="checkbox" name="f_血壓">血壓</label>
          <label class="flag"><input type="checkbox" name="f_血糖">血糖</label>
          <label class="flag"><input type="checkbox" name="f_血脂">血脂</label>
          <label class="flag"><input type="checkbox" name="f_壓力">壓力</label>
          <label class="flag"><input type="checkbox" name="f_癌症">癌症</label>
        </div>
      </div>
      <div class="field"><label>其他</label><input type="text" name="慢性其他"></div>
      <div class="field"><label>相關診斷及用藥情況</label><textarea name="用藥情況"></textarea></div>
      <div class="field"><label>自評健康分數（1–10）</label>
        <div class="scale" data-scale="自評健康分數"></div>
      </div>
      <div class="field"><label>本次諮詢期待（可複選）</label>
        <div class="chips">
          <label class="chip"><input type="checkbox" name="期待_早期發現問題">早期發現問題</label>
          <label class="chip"><input type="checkbox" name="期待_找出不適原因">找出身體不適原因</label>

<script>
/* ---------- Data model ---------- */
const SYM_SECTIONS = [
  { id:"diet",  title:"飲食作息", color:"var(--leaf)", items:[
    "常吃（紅）肉","素食飲食","想吃油炸類","想（常）吃甜食／零食","常喝茶／咖啡／飲料／牛奶／優格",
    "外食比例","吃宵夜","不吃早餐","少喝水","少吃菜／水果","用餐時間不定","用餐速度快","嗜酒／抽煙","運動習慣","久坐／久站"]},
  { id:"gi", title:"消化道", color:"var(--teal)", items:[
    "消化不良","脹氣","打嗝","胃酸多","胃酸逆流","常胃痛","食慾不振","便秘","腹瀉","排氣味道重",
    "愛吃麵／飯","不吃碳水","用制酸劑","食物過敏","無營養補充習慣","使用補充品"]},
  { id:"inflam", title:"發炎缺氧", color:"var(--coral)", items:[
    "工作易疲勞／累","容易嗜睡","睡不飽","注意力分心","忘東忘西","常打哈欠","嚴重打呼","熬夜加班",
    "慢性疼痛","常嘴破","使用成藥","長期用藥（慢性病）","近期抗生素","嘗試減重","腰圍超標","肩頸痠痛","疫苗／確診"]},
  { id:"ans", title:"自律神經", color:"var(--violet)", items:[
    {n:"睡眠時間",type:"num",unit:"小時"},{n:"淺眠"},{n:"失眠（長期）"},{n:"半夜起床"},{n:"多夢"},
    {n:"壓力指數",type:"scale"},{n:"活力指數",type:"scale"},
    {n:"易生氣"},{n:"易緊張"},{n:"易擔心"},{n:"自我要求高"},{n:"無法放鬆"},{n:"情緒低落"},
    {n:"感到孤單"},{n:"負面思考"},{n:"心悸"},{n:"胸悶"},{n:"手腳多（盜）汗"},{n:"耳鳴"},{n:"頻尿"},{n:"靜心冥想"}]},
  { id:"heart", title:"心、肝、眼", color:"var(--coral)", items:[
    "爬樓梯易喘","頭暈","偏頭痛","手腳冰冷","手腳麻","水腫","氣色不好","傷口不易好","曾中風","心臟支架",
    "眼—乾澀","眼—疲勞","眼—老花","眼—畏光","眼—手術"]},
  { id:"immune", title:"免疫、內分泌、毒素累積", color:"var(--amber)", items:[
    "甲狀腺亢進","甲狀腺低下","體重變化","常感冒","感冒不易好","不太感冒","氣喘","落髮","過敏","起床鼻塞",
    "濕疹","蕁麻疹","皰疹","異位性皮膚炎","其他","常接觸空污","長痘痘不易改善","使用塑膠餐盒","補牙／牙周病"]},
  { id:"repro", title:"生殖、肌肉、骨骼", color:"var(--leaf)", items:[
    "經前症候群","經痛","經期延遲","子宮肌瘤","常化妝","反覆感染","內膜異位","多囊性","已更年期中","懷孕",
    "備孕哺乳","攝護腺肥大","骨折","骨鬆","關節炎","下背痛","腰痠","椎間盤","常抽筋"]}
];

const LAB_FIELDS = [
  {label:"總膽固醇",         type:"num", unit:"mg/dL", normal:[0,200]},
  {label:"三酸甘油脂",       type:"num", unit:"mg/dL", normal:[0,150]},
  {label:"低密度脂蛋白 LDL", type:"num", unit:"mg/dL", normal:[0,130]},
  {label:"高密度脂蛋白 HDL", type:"num", unit:"mg/dL", normal:[40,9999]},
  {label:"收縮壓",           type:"num", unit:"mmHg",  normal:[90,120]},
  {label:"舒張壓",           type:"num", unit:"mmHg",  normal:[60,80]},
  {label:"空腹血糖",         type:"num", unit:"mg/dL", normal:[70,100]},
  {label:"糖化血色素 HbA1c", type:"num", unit:"%",     normal:[0,5.7]},
  {label:"肝指數",           type:"text"},
  {label:"肝炎",             type:"text"},
  {label:"貧血",             type:"text"},
  {label:"腎絲球過濾率 GFR", type:"text"},
  {label:"腎結石",           type:"text"},
  {label:"發炎指數 CRP",     type:"text"},
  {label:"肝臟／腎臟疾病",   type:"text"}
];

/* ---------- Build symptom sections ---------- */
function buildSym(sec){
  const rows = sec.items.map((raw,idx)=>{
    const it = (typeof raw==="string") ? {n:raw} : raw;
    const base = `${sec.id}_${idx}_`;
    if(it.type==="scale"){
      return `<div class="sym"><div class="sym-top"><span class="sym-name">${it.n}</span></div>
        <div class="scale" data-scale="${base}now" style="margin-top:9px"></div></div>`;
    }
    if(it.type==="num"){
      return `<div class="sym"><div class="sym-top"><span class="sym-name">${it.n}</span>
        <div class="with-unit" style="width:120px"><input type="number" inputmode="decimal" step="0.5" name="${base}val" placeholder="">
        <span class="unit">${it.unit||""}</span></div></div></div>`;
    }
    return `<div class="sym" data-sym>
      <div class="sym-top">
        <span class="sym-name">${it.n}</span>
        <div class="sym-toggles">
          <label class="t now"><input type="radio" name="${base}state" value="now" data-detailtrigger>目前</label>
          <label class="t past"><input type="radio" name="${base}state" value="past" data-detailtrigger>曾經</label>
        </div>
      </div>
      <div class="sym-detail">
        <div><label>程度</label><select name="${base}deg"><option value="">—</option><option>輕</option><option>中</option><option>重</option></select></div>
        <div><label>次數（次／週·月）</label><input type="text" name="${base}freq" placeholder="例：3／週"></div>
        <div><label>持續時間</label><input type="text" name="${base}dur" placeholder="例：2 年 3 月"></div>
        <div><label>透過什麼改善（藥）</label><input type="text" name="${base}fix"></div>
        <div class="full"><label>備註</label><input type="text" name="${base}note"></div>
      </div>
    </div>`;
  }).join("");
  return `<section id="s-${sec.id}" data-title="${sec.title}" style="--sec-color:${sec.color}">
    <div class="sec-head"><span class="dot"></span>
      <h2>${sec.title}</h2><span class="count">${sec.items.length} 項</span>
      <svg class="chev" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg></div>
    <div class="sec-body">${rows}</div>
  </section>`;
}
document.getElementById("sections").innerHTML = SYM_SECTIONS.map(buildSym).join("");

/* Gene priority & improve rows */
(function(){
  ["genePriority","geneImprove"].forEach((hostId,gi)=>{
    const host=document.getElementById(hostId);
    if(!host) return;
    const labels=gi===0?["第","順位"]:["第","順位對應改善方式"];
    let html="";
    for(let i=1;i<=3;i++){
      html+=`<div class="prio-row">
        <span class="prio-num" style="${gi===1?"background:var(--leaf)":""}">${i}</span>
        <textarea class="prio-input" name="${gi===0?"主要問題":"改善方式"}${i}" rows="1" placeholder="${labels[0]} ${i} ${labels[1]}"></textarea>
      </div>`;
    }
    host.innerHTML=html;
    host.querySelectorAll(".prio-input").forEach(ta=>{
      const grow=()=>{ ta.style.height="auto"; ta.style.height=ta.scrollHeight+"px"; };
      ta.addEventListener("input",grow); grow();
    });
  });
})();

/* Lab grid */
document.getElementById("labgrid").innerHTML = LAB_FIELDS.map((f,i)=>{
  if(f.type==="num"){
    return `<div class="field lab-num" data-lab-idx="${i}">
      <label>${f.label}</label>
      <div class="with-unit"><input type="number" inputmode="decimal" step="any" name="lab_${i}_val">${f.unit?`<span class="unit">${f.unit}</span>`:""}</div>
      <div class="med-toggle">
        <label class="medopt"><input type="radio" name="lab_${i}_med" value="無用藥"><span>無用藥</span></label>
        <label class="medopt"><input type="radio" name="lab_${i}_med" value="有用藥"><span>有用藥</span></label>
      </div>
    </div>`;
  }
  return `<div class="field"><label>${f.label}</label><input type="text" name="lab_${i}"></div>`;
}).join("");

/* Lab abnormal highlight */
function checkLabAbnormal(inp, idx){
  const f=LAB_FIELDS[idx]; if(!f||!f.normal) return;
  const v=parseFloat(inp.value);
  const bad=inp.value!==""&&!isNaN(v)&&(v<f.normal[0]||v>f.normal[1]);
  inp.style.color=bad?"#d32f2f":"";
  inp.style.fontWeight=bad?"600":"";
  inp.closest(".lab-num").querySelector("label").style.color=bad?"#d32f2f":"";
}
document.querySelectorAll(".lab-num").forEach(div=>{
  const idx=parseInt(div.dataset.labIdx);
  const inp=div.querySelector("input[type=number]");
  if(inp){ inp.addEventListener("input",()=>checkLabAbnormal(inp,idx)); checkLabAbnormal(inp,idx); }
});

/* Med toggle — tap same option again to deselect */
document.querySelectorAll(".med-toggle .medopt input").forEach(inp=>{
  inp.addEventListener("click",function(){
    if(this.dataset.was==="1"){ this.checked=false; this.dataset.was="0"; }
    else{ this.closest(".med-toggle").querySelectorAll("input").forEach(o=>o.dataset.was="0"); this.dataset.was="1"; }
    this.closest(".med-toggle").querySelectorAll(".medopt").forEach(l=>l.classList.toggle("on",l.querySelector("input").checked));
    scheduleSave();
  });
});

/* Scales */
document.querySelectorAll(".scale[data-scale]").forEach(s=>{
  const name=s.dataset.scale;
  const reversed=(name==="ans_5_now");
  const coloured=(name==="ans_5_now")||(name==="ans_6_now")||name.includes("健康");
  let html="";
  for(let i=1;i<=10;i++){
    let style="";
    if(coloured){
      const t=reversed?(i-1)/9:1-(i-1)/9;
      const r=Math.round(14+t*(214-14)),g=Math.round(124+t*(74-124)),b=Math.round(134+t*(63-134));
      style=`style="--scl-bg:rgb(${r},${g},${b});--scl-light:rgba(${r},${g},${b},.13);--scl-border:rgba(${r},${g},${b},.35);--scl-text:rgba(${r},${g},${b},.85)"`;
    }
    html+=`<label><input type="radio" name="${name}" value="${i}"><span ${style}>${i}</span></label>`;
  }
  s.innerHTML=html;
});

/* Build nav + drawer */
const navEl=document.getElementById("nav");
const drawerList=document.getElementById("drawerList");
const drawer=document.getElementById("drawer");
const drawerOverlay=document.getElementById("drawerOverlay");

const SEC_COLORS={"基本資料":"var(--teal)","飲食作息":"var(--leaf)","消化道":"var(--teal)",
  "發炎缺氧":"var(--coral)","自律神經":"var(--violet)","心、肝、眼":"var(--coral)",
  "免疫、內分泌、毒素累積":"var(--amber)","生殖、肌肉、骨骼":"var(--leaf)",
  "結合基因相關建議":"var(--violet)","健康檢查":"var(--amber)"};

let secCounter=0;
document.querySelectorAll("section[data-title]").forEach(sec=>{
  secCounter++;
  const title=sec.dataset.title;
  const color=sec.style.getPropertyValue("--sec-color")||"var(--teal)";
  const countEl=sec.querySelector(".count");
  const countTxt=countEl?countEl.textContent:"";

  // nav pill
  const a=document.createElement("a");
  a.textContent=title; a.dataset.target=sec.id; a.setAttribute("role","button"); a.tabIndex=0;
  navEl.appendChild(a);

  // drawer item
  const di=document.createElement("div");
  di.className="drawer-item"; di.dataset.target=sec.id;
  di.innerHTML=`<span class="d-dot" style="background:${color}">${secCounter}</span>
    <span class="d-label">${title}</span>${countTxt?`<span class="d-count">${countTxt}</span>`:""}`;
  drawerList.appendChild(di);
  di.addEventListener("click",()=>{ closeDrawer(); jumpTo(sec); });
});

function openDrawer(){
  drawer.classList.add("open");
  drawerOverlay.classList.add("open");
  // sync active
  const activeNav=navEl.querySelector("a.active");
  drawerList.querySelectorAll(".drawer-item").forEach(di=>{
    di.classList.toggle("active", activeNav&&di.dataset.target===activeNav.dataset.target);
  });
}
function closeDrawer(){ drawer.classList.remove("open"); drawerOverlay.classList.remove("open"); }
function jumpTo(sec){
  sec.classList.remove("collapsed");
  requestAnimationFrame(()=>{
    const top=sec.getBoundingClientRect().top+window.pageYOffset-navH()-8;
    window.scrollTo({top:Math.max(0,top),behavior:"smooth"});
  });
}

document.getElementById("navMenuBtn").addEventListener("click",openDrawer);
document.getElementById("drawerClose").addEventListener("click",closeDrawer);
drawerOverlay.addEventListener("click",closeDrawer);

/* ---------- Interactions ---------- */
document.querySelectorAll(".sec-head").forEach(h=>{
  h.addEventListener("click",()=>h.parentElement.classList.toggle("collapsed"));
});
function refreshChip(i){ i.closest(".chip")?.classList.toggle("on",i.checked); }
function refreshFlag(i){ i.closest(".flag")?.classList.toggle("on",i.checked); }
function refreshSym(sym){
  if(!sym) return;
  sym.querySelectorAll(".t").forEach(l=>{
    const inp=l.querySelector("input");
    l.classList.toggle("on", inp.checked);
  });
  const any=!!sym.querySelector(".t input:checked");
  sym.classList.toggle("open",any);
}

// 用 mousedown/touchstart 記錄點擊前狀態，click 時決定是否取消
document.querySelectorAll("[data-sym]").forEach(sym=>{
  sym.querySelectorAll(".t").forEach(label=>{
    const inp=label.querySelector("input[type=radio]");
    if(!inp) return;
    let wasChecked=false;
    label.addEventListener("mousedown",()=>{ wasChecked=inp.checked; });
    label.addEventListener("touchstart",()=>{ wasChecked=inp.checked; },{passive:true});
    label.addEventListener("click",()=>{
      if(wasChecked){
        inp.checked=false;
      }
      refreshSym(sym);
      scheduleSave();
    });
  });
});
document.addEventListener("change",e=>{
  const t=e.target;
  if(t.matches(".chip input")) refreshChip(t);
  if(t.matches(".flag input")) refreshFlag(t);
  // .t radio 由獨立 click handler 處理
  scheduleSave();
});
document.addEventListener("input",()=>{ scheduleSave(); updateProgress(); });

/* ---------- Persistence ---------- */
const KEY="tl_health_form_v1";
const form=document.getElementById("form");
let saveTimer;
function collect(){
  const d={};
  form.querySelectorAll("input,select,textarea").forEach(el=>{
    if(el.type==="checkbox") d[el.name]=el.checked;
    else if(el.type==="radio"){ if(el.checked) d[el.name]=el.value; }
    else if(el.value!=="") d[el.name]=el.value;
  });
  return d;
}
function apply(data){
  if(!data) return;
  form.querySelectorAll("input,select,textarea").forEach(el=>{
    if(!(el.name in data)) return;
    if(el.type==="checkbox") el.checked=!!data[el.name];
    else if(el.type==="radio") el.checked=(data[el.name]===el.value);
    else el.value=data[el.name]??"";
  });
  document.querySelectorAll(".chip input").forEach(refreshChip);
  document.querySelectorAll(".flag input").forEach(refreshFlag);
  document.querySelectorAll("[data-sym]").forEach(refreshSym);
  document.querySelectorAll(".med-toggle .medopt").forEach(l=>{
    const inp=l.querySelector("input");
    l.classList.toggle("on",inp.checked);
    inp.dataset.was=inp.checked?"1":"0";
  });
  document.querySelectorAll(".prio-input").forEach(ta=>{ ta.style.height="auto"; ta.style.height=ta.scrollHeight+"px"; });
}
function save(){
  try{
    const data=collect();
    data["__advisorName"]=document.getElementById("advisorName").textContent.trim();
    localStorage.setItem(KEY,JSON.stringify(data));
  }catch(e){}
}
function load(){
  try{
    const raw=localStorage.getItem(KEY);
    if(raw){
      const data=JSON.parse(raw);
      apply(data);
      if(data["__advisorName"]) document.getElementById("advisorName").textContent=data["__advisorName"];
      document.querySelectorAll(".lab-num").forEach(div=>{
        const inp=div.querySelector("input[type=number]");
        if(inp) checkLabAbnormal(inp,parseInt(div.dataset.labIdx));
      });
    }
  }catch(e){}
}
function scheduleSave(){ clearTimeout(saveTimer); saveTimer=setTimeout(save,600); }
document.getElementById("advisorName").addEventListener("input",scheduleSave);
document.getElementById("advisorName").addEventListener("keydown",e=>{ if(e.key==="Enter"){ e.preventDefault(); e.target.blur(); }});

/* ---------- Progress ---------- */
function updateProgress(){
  const radioGroups={},radioDone={};
  let total=0,done=0;
  [...form.querySelectorAll("input,select,textarea")].forEach(el=>{
    if(el.type==="radio"){ radioGroups[el.name]=true; if(el.checked) radioDone[el.name]=true; return; }
    if(el.type==="checkbox") return;
    total++; if(el.value!=="") done++;
  });
  total+=Object.keys(radioGroups).length;
  done+=Object.keys(radioDone).length;
  document.getElementById("bar").style.width=(total?Math.round(done/total*100):0)+"%";
}

/* ---------- Nav scrollspy ---------- */
const links=[...navEl.querySelectorAll("a")];
const secEls=[...document.querySelectorAll("section[data-title]")];
function navH(){ return (navEl.closest("nav")?.offsetHeight||48)+8; }
function centerPill(pill){
  const s=navEl,pr=pill.getBoundingClientRect(),sr=s.getBoundingClientRect();
  s.scrollTo({left:Math.max(0,s.scrollLeft+(pr.left-sr.left)-(s.clientWidth/2)+(pr.width/2)),behavior:"smooth"});
}
const io=new IntersectionObserver(entries=>{
  entries.forEach(en=>{
    if(en.isIntersecting){
      links.forEach(l=>l.classList.toggle("active",l.dataset.target===en.target.id));
      const active=navEl.querySelector("a.active");
      if(active) centerPill(active);
    }
  });
},{rootMargin:"-45% 0px -50% 0px"});
secEls.forEach(s=>io.observe(s));
links.forEach(l=>l.addEventListener("click",ev=>{
  ev.preventDefault();
  const sec=document.getElementById(l.dataset.target);
  if(!sec) return;
  jumpTo(sec);
}));

/* ---------- Toast ---------- */
let toastTimer;
function toast(msg){
  const t=document.getElementById("toast");
  t.textContent=msg; t.classList.add("show");
  clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.classList.remove("show"),2400);
}

/* ---------- Print gene section ---------- */
document.getElementById("btnPrintGene").addEventListener("click", function(){
  const data = collect();
  const name = (data["姓名"] || "未命名").trim();
  const date = (data["日期"] || new Date().toISOString().slice(0,10));

  const promotes = ["促進_生活型態","促進_飲食習慣","促進_營養補充"]
    .map((k,i) => (data[k]==="true"||data[k]===true)
      ? ["改變生活型態","改變飲食習慣","使用營養補充品"][i] : null)
    .filter(Boolean);

  const rows = [1,2,3].map(i=>({
    prob:(data[`主要問題${i}`]||"").trim(),
    impr:(data[`改善方式${i}`]||"").trim()
  })).filter(r=>r.prob||r.impr);

  const promoteHTML = promotes.length
    ? `<p style="margin:0 0 14px">${promotes.map(t=>`<span style="display:inline-block;margin:3px 4px;padding:4px 12px;border:1px solid #6b5bb0;border-radius:999px;font-size:.82rem;color:#6b5bb0">${t}</span>`).join("")}</p>`
    : "";

  const tableRows = rows.length
    ? rows.map((r,i)=>`<tr style="${i%2===1?'background:#fafafa':''}">
        <td style="width:32px;text-align:center;color:#6b5bb0;font-weight:700;padding:10px">${i+1}</td>
        <td style="padding:10px;border:1px solid #ddd">${r.prob||"—"}</td>
        <td style="padding:10px;border:1px solid #ddd">${r.impr||"—"}</td></tr>`).join("")
    : `<tr><td colspan="3" style="color:#aaa;text-align:center;padding:14px">尚未填寫</td></tr>`;

  const html = `<!DOCTYPE html><html lang="zh-Hant"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>基因建議_${name}_${date}</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
      body{font-family:"Noto Sans TC",sans-serif;color:#111;margin:0;padding:32px;background:#fff;max-width:720px;margin:0 auto}
      h2{margin:0 0 4px;font-size:1.4rem;color:#6b5bb0}
      .meta{font-size:.85rem;color:#555;margin-bottom:18px}
      hr{border:none;border-top:2px solid #6b5bb0;margin-bottom:18px}
      table{width:100%;border-collapse:collapse;margin-top:4px}
      th{background:#f1eff9;color:#6b5bb0;padding:9px 12px;text-align:left;font-size:.85rem;border:1px solid #ddd}
      td{border:1px solid #ddd;vertical-align:top}
      footer{margin-top:32px;font-size:.72rem;color:#aaa;text-align:center;border-top:1px solid #eee;padding-top:12px}
      @media print{button{display:none!important}}
    </style>
  </head><body>
    <h2>結合基因相關建議</h2>
    <div class="meta">姓名：${name}　日期：${date}</div>
    <hr>
    ${promoteHTML}
    <table>
      <thead><tr><th style="width:40px">#</th><th>主要問題</th><th>對應改善方式</th></tr></thead>
      <tbody>${tableRows}</tbody>
    </table>
    <footer>天領 Talent Lead · 本文件僅供健康諮詢參考，不構成醫療診斷</footer>
    <p style="text-align:center;margin-top:20px">
      <button onclick="window.print()" style="padding:10px 28px;background:#6b5bb0;color:#fff;border:none;border-radius:8px;font-size:1rem;cursor:pointer">列印 / 儲存 PDF</button>
    </p>
  </body></html>`;

  const blob = new Blob([html], {type:"text/html;charset=utf-8"});
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement("a");
  a.href = url;
  a.target = "_blank";
  a.rel = "noopener";
  document.body.appendChild(a);
  a.click();
  a.remove();
  setTimeout(()=>URL.revokeObjectURL(url), 30000);
  toast("已開啟新分頁，請在頁面內按「列印 / 儲存 PDF」");
});

/* ---------- Clear modal ---------- */
const modal=document.getElementById("modal");
function doClear(){
  try{localStorage.removeItem(KEY);}catch(e){}
  form.reset();
  document.querySelectorAll(".on").forEach(el=>el.classList.remove("on"));
  document.querySelectorAll(".sym.open").forEach(el=>el.classList.remove("open"));
  updateProgress(); toast("表單已清除");
}
document.getElementById("btnClear").addEventListener("click",()=>modal.classList.add("show"));
document.getElementById("modalCancel").addEventListener("click",()=>modal.classList.remove("show"));
document.getElementById("modalOk").addEventListener("click",()=>{ modal.classList.remove("show"); doClear(); });
modal.addEventListener("click",e=>{ if(e.target===modal) modal.classList.remove("show"); });

/* ---------- Brand image ---------- */
const brandMark = document.getElementById("brandMark");
const brandFile = document.getElementById("brandFile");
const brandImg  = document.getElementById("brandImg");
const brandText = document.getElementById("brandText");
const LOGO_KEY  = "tl_brand_logo_v1";

function applyLogo(dataUrl){
  brandImg.src = dataUrl;
  brandImg.style.display = "block";
  brandText.style.display = "none";
}
function removeLogo(){
  brandImg.src = "";
  brandImg.style.display = "none";
  brandText.style.display = "";
}
// load saved logo
try{
  const saved = localStorage.getItem(LOGO_KEY);
  if(saved) applyLogo(saved);
}catch(e){}

brandMark.addEventListener("click", ()=> brandFile.click());
brandFile.addEventListener("change", e=>{
  const f = e.target.files[0];
  if(!f) return;
  const reader = new FileReader();
  reader.onload = ev=>{
    applyLogo(ev.target.result);
    try{ localStorage.setItem(LOGO_KEY, ev.target.result); }catch(e){}
    toast("品牌圖片已更新");
  };
  reader.readAsDataURL(f);
  brandFile.value = "";
});
// right-click / long-press to remove
brandMark.addEventListener("contextmenu", e=>{
  if(brandImg.style.display !== "none"){
    e.preventDefault();
    removeLogo();
    try{ localStorage.removeItem(LOGO_KEY); }catch(e){}
    toast("已恢復預設圖示");
  }
});

/* ---------- Init ---------- */
load();
updateProgress();
